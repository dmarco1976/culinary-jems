<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    .card {
      background: var(--dark);
    }

    .header-bar {
      background: var(--gold);
      padding: 40px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-bar h1 {
      font-size: 36px;
      font-weight: 800;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .header-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }

    .body-content {
      padding: 60px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
    }

    .venue-name {
      font-size: 64px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
    }

    .event-details {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 30px;
      color: var(--light);
      font-weight: 600;
    }

    .detail-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .address-text {
      font-size: 24px;
      color: rgba(250, 250, 250, 0.7);
      font-weight: 400;
      margin-top: 8px;
    }

    .divider {
      width: 100%;
      height: 2px;
      background: rgba(255, 197, 89, 0.3);
    }

    .footer-bar {
      background: rgba(255, 197, 89, 0.1);
      padding: 32px 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .footer-bar span {
      font-size: 22px;
      color: var(--gold);
      font-weight: 600;
    }

    .directions-text {
      font-size: 20px;
      color: var(--gold);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="template-square card flex flex-col">
    <!-- Gold Header Bar -->
    <div class="header-bar">
      <h1>Come Find Us!</h1>
      <img class="header-logo" src="{{logoUrl}}" alt="Culinary JEMs">
    </div>

    <!-- Body Content -->
    <div class="body-content">
      <div class="venue-name">{{venue}}</div>

      <div class="divider"></div>

      <div class="event-details">
        <!-- Date -->
        <div class="detail-row">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="#FFC559">
            <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
          </svg>
          <span>{{date}}</span>
        </div>

        <!-- Time -->
        <div class="detail-row">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="#FFC559">
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/>
          </svg>
          <span>{{time}}</span>
        </div>

        <!-- Address -->
        <div class="detail-row">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="#FFC559">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/>
          </svg>
          <span>{{address}}</span>
        </div>
      </div>

      <div class="address-text">{{city}}</div>
    </div>

    <!-- Footer -->
    <div class="footer-bar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#FFC559">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/>
      </svg>
      <span class="directions-text">Get Directions</span>
    </div>
  </div>
</body>
</html>
